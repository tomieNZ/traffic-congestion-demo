services:
  - type: web
    name: traffic-congestion-demo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: HMAC_SECRET
        generateValue: true
      - key: DEMO_USERNAME
        value: operator
      - key: DEMO_PASSWORD
        sync: false
      - key: DATABASE_PATH
        value: /tmp/traffic_demo.sqlite3
